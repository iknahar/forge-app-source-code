name: Forge
options:
  bundleIdPrefix: com.toolkit
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Forge:
    type: application
    platform: macOS
    sources:
      - path: Forge/Sources
        type: group
      - path: Forge/Resources
        type: group
        excludes:
          - "RecordingBackgrounds"
          - "RecordingBackgrounds/**"
      # Bundled as a folder reference so dropped-in images ship inside the app
      # and are reachable at Bundle.main.resourceURL/RecordingBackgrounds/.
      - path: Forge/Resources/RecordingBackgrounds
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toolkit.forge
        PRODUCT_NAME: Forge
        MARKETING_VERSION: "1.0.19"
        CURRENT_PROJECT_VERSION: 20
        INFOPLIST_FILE: Forge/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Forge/Resources/Forge.entitlements
        LS_UI_ELEMENT: YES
        ARCHS: "$(ARCHS_STANDARD)"
        # Ad-hoc signing ("-") for distribution. We briefly signed with a
        # self-signed "Forge Dev" cert to keep Keychain/TCC grants sticky
        # on the build machine, but a self-signed cert is only trusted on
        # the Mac that created it — distributed builds crashed on OTHER
        # Macs. Ad-hoc is the portable, free option (how 1.0.0–1.0.4
        # shipped and ran everywhere). Removing Gatekeeper prompts on
        # other Macs would require a paid Apple Developer ID + notarization.
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
        # Never inject the get-task-allow ("allow debugging") entitlement
        # into builds — it has no place in a distributed app.
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_EMIT_LOC_STRINGS: YES

    postBuildScripts:
      - script: |
          # Strip debug symbols for release
          if [ "${CONFIGURATION}" = "Release" ]; then
            strip -x "${TARGET_BUILD_DIR}/${EXECUTABLE_PATH}"
          fi
        name: Strip Debug Symbols (Release)

  ForgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ForgeTests
        type: group
    dependencies:
      - target: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.toolkit.forge.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Forge.app/Contents/MacOS/Forge"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  Forge:
    build:
      targets:
        Forge: all
        ForgeTests: [test]
    run:
      config: Debug
      commandLineArguments:
        "-NSConstraintBasedLayoutVisualizeMutuallyExclusiveConstraints": "YES"
    test:
      config: Debug
      targets:
        - ForgeTests
    archive:
      config: Release
